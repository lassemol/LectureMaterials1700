<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pirate Ship Cross Section</title>
  <link
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous"
  />
  <link href="style.css" rel="stylesheet">
</head>
<body>
<h1>A Seafarer's Vessel</h1>
<div class="container">
  <div class="ship row">
    <div class="col-12 col-md-4">
      <img src="img/top.png" alt="Masts and Rigging">
      <h2>Masts and Rigging</h2>
      <p>The towering masts and tangled rigging that command the wind.</p>
    </div>

    <div class="col-12 col-md-4">
      <img src="img/middle.png" alt="Gun Deck">
      <h2>Gun Deck</h2>
      <p>The working deck where cannons stand ready and sailors carry out their duties.</p>
    </div>

    <div class="col-12 col-md-4">
      <img src="img/bottom.png" alt="The Hold">
      <h2>The Hold</h2>
      <p>Deep in the belly of the ship, cargo and provisions rest in dim lantern light.</p>
    </div>
  </div>
</div>


</body>
</html>
